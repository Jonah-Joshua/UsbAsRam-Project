name: Driver Build Workflow
on: [push, workflow_dispatch]

env:
  # Opt into Node.js 24 to resolve deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        shell: pwsh
        run: |
          # Define the WDK installer URL (Targeting Windows 11/10 SDK 22621)
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
          $wdkPath = "$env:TEMP\wdksetup.exe"
          
          Write-Host "Downloading WDK..."
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkPath
          
          Write-Host "Installing WDK... (This may take 2-5 minutes)"
          # Quiet installation prevents the UI from hanging the runner
          Start-Process -FilePath $wdkPath -ArgumentList "/quiet", "/norestart", "/ceip off" -Wait
          Write-Host "WDK Installation complete."

      - name: Build Driver (Release x64)
        run: |
          msbuild UsbAsRam.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:SpectreMitigation=false `
            /p:WindowsTargetPlatformVersion=10.0 `
            /p:TargetVersion=Windows10

      - name: Save the Polished Output
        uses: actions/upload-artifact@v4
        with:
          name: UsbAsRam-Binary
          # Verify this path matches your project structure
          path: x64/Release/
