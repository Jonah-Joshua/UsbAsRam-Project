name: Driver Build Workflow
on: [push, workflow_dispatch]

env:
  # This tells GitHub to run Node 20 actions on Node 24 without throwing a fit
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        shell: pwsh
        run: |
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
          $wdkPath = "$env:TEMP\wdksetup.exe"
          Write-Host "Downloading WDK..."
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkPath
          
          Write-Host "Installing WDK (Headers & Libs)..."
          # Adding /features + ensures the actual headers are installed
          Start-Process -FilePath $wdkPath -ArgumentList "/quiet", "/norestart", "/features +", "/ceip off" -Wait
          Write-Host "WDK Installation complete."

      - name: Build Driver (Release x64)
        shell: cmd
        run: |
          msbuild UsbAsRam.vcxproj ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:SpectreMitigation=false ^
            /p:WindowsTargetPlatformVersion=10.0 ^
            /p:TargetVersion=Windows10

      - name: Save Driver Output
        uses: actions/upload-artifact@v4
        with:
          name: UsbAsRam-Binary
          # This finds the .sys file wherever MSBuild decided to put it
          path: |
            **/Release/*.sys
            **/Release/*.inf
            **/Release/*.cer
