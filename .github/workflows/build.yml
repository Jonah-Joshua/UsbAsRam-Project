name: Driver Build Workflow
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK (Headers and Libs)
        shell: pwsh
        run: |
          # Use a direct link to the 22621 WDK (Windows 11, version 22H2)
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
          $wdkPath = "$env:TEMP\wdksetup.exe"
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkPath
          
          Write-Host "Installing WDK... this usually takes 3-4 minutes."
          # Adding /installpath ensures we know where it goes, /features + ensures headers
          Start-Process -FilePath $wdkPath -ArgumentList "/quiet", "/installpath C:\WDK", "/features +", "/ceip off" -Wait
          
          # Force the path into the environment for this session
          echo "C:\WDK\Include\10.0.22621.0\km" >> $env:GITHUB_PATH

      - name: Build Driver (Release x64)
        shell: cmd
        env:
          # This forces the compiler to look in the WDK folders we installed
          INCLUDE: C:\WDK\Include\10.0.22621.0\km;C:\WDK\Include\10.0.22621.0\shared;C:\WDK\Include\10.0.22621.0\um;%INCLUDE%
          LIB: C:\WDK\Lib\10.0.22621.0\km\x64;%LIB%
        run: |
          msbuild UsbAsRam.vcxproj ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:SpectreMitigation=false
