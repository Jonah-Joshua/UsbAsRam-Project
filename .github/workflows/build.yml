name: Driver Build Workflow
on: [push, workflow_dispatch]

env:
  # This suppresses the Node.js 20 deprecation warnings and forces Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_driver:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows Driver Kit (WDK)
        shell: pwsh
        run: |
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
          $wdkPath = "$env:TEMP\wdksetup.exe"
          Write-Host "Downloading WDK..."
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkPath
          Write-Host "Installing WDK Headers and Libs..."
          # The /features + flag is the secret sauce to ensure ntddk.h is installed
          Start-Process -FilePath $wdkPath -ArgumentList "/quiet", "/norestart", "/features +", "/ceip off" -Wait
          Write-Host "WDK Installation complete."

      - name: Build UsbAsRam
        shell: cmd
        run: |
          msbuild UsbAsRam.vcxproj ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:SpectreMitigation=false ^
            /p:WindowsTargetPlatformVersion=10.0 ^
            /p:TargetVersion=Windows10

      - name: Upload Driver Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UsbAsRam-Driver-Package
          path: |
            **/Release/*.sys
            **/Release/*.inf
            **/Release/*.pdb
