name: Driver Build Workflow
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Driver (Release x64)
        run: |
          msbuild UsbAsRam.vcxproj /p:Configuration=Release /p:Platform=x64 /p:SpectreMitigation=Spectre
          
      - name: Save the Polished Output
        uses: actions/upload-artifact@v4
        with:
          name: UsbAsRam-Binary
          path: x64/Release/
