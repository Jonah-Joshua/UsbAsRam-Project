name: Driver Build Workflow
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install WDK
        shell: pwsh
        run: |
          $url = "https://go.microsoft.com/fwlink/?linkid=2196230"
          $out = "$env:TEMP\wdksetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList "/quiet", "/installpath C:\WDK", "/features +", "/ceip off" -Wait

      - name: Verify WDK Headers
        shell: pwsh
        run: |
          $path = "C:\WDK\Include\10.0.22621.0\km\ntddk.h"
          if (Test-Path $path) { 
            Write-Host "Found ntddk.h at $path" 
          } else { 
            Write-Error "WDK NOT FOUND! Check install path."
            exit 1 
          }

      - name: Build Driver
        run: msbuild UsbAsRam.vcxproj /p:Configuration=Release /p:Platform=x64
