name: Driver Build Workflow
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WDK
        shell: pwsh
        run: |
          $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
          $wdkPath = "$env:TEMP\wdksetup.exe"
          Write-Host "Downloading WDK..."
          Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkPath
          Write-Host "Installing WDK..."
          # The /features + flag ensures the headers and libs are actually installed
          Start-Process -FilePath $wdkPath -ArgumentList "/quiet", "/norestart", "/features +", "/ceip off" -Wait
          Write-Host "WDK Installation complete."

      - name: Verify WDK Headers (Debug)
        shell: pwsh
        run: |
          $header = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\" -Filter "ntddk.h" -Recurse -ErrorAction SilentlyContinue
          if ($header) { 
            Write-Host "Found ntddk.h at: $($header.FullName)" 
          } else { 
            Write-Error "ntddk.h NOT FOUND. Build will fail." 
          }

      - name: Build Driver (Release x64)
        shell: cmd
        run: |
          msbuild UsbAsRam.vcxproj ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:SpectreMitigation=false ^
            /p:WindowsTargetPlatformVersion=10.0 ^
            /p:TargetVersion=Windows10

      - name: Upload Driver Binary
        uses: actions/upload-artifact@v4
        with:
          name: UsbAsRam-Binary
          # Search for the .sys file wherever it was dropped
          path: |
            **/Release/*.sys
            **/Release/*.inf
