image: Visual Studio 2022
configuration: Release
platform: x64

build: off

build_script:
  - ps: |
      # Find the latest WDK install path and set it for the build session
      $wdkPath = "C:\Program Files (x86)\Windows Kits\10"
      $env:WDKContentRoot = $wdkPath
  - msbuild UsbAsRam.vcxproj /p:Configuration=Release /p:Platform=x64 /p:SpectreMitigation=false /p:TargetVersion="Windows10" /verbosity:minimal /logger:"C:\Program Files\AppVeyor\BuildAgent\Appveyor.MSBuildLogger.dll"

artifacts:
  - path: 'x64\Release\*.sys'
    name: Driver
  - path: 'x64\Release\*.inf'
    name: DriverInfo
