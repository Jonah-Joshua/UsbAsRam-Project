image: Visual Studio 2022
configuration: Release
platform: x64

build: off

build_script:
  - ps: |
      # We found 10.0.22000.0 in your search, let's use it explicitly
      $env:WindowsSdkDir = "C:\Program Files (x86)\Windows Kits\10\"
      $env:WindowsSDKVersion = "10.0.22000.0"
      
      # Run MSBuild with the explicit SDK/WDK version targets
      msbuild UsbAsRam.vcxproj `
        /p:Configuration=Release `
        /p:Platform=x64 `
        /p:TargetPlatformVersion=10.0.22000.0 `
        /p:WindowsTargetPlatformVersion=10.0.22000.0 `
        /p:SpectreMitigation=false `
        /v:m `
        /logger:"C:\Program Files\AppVeyor\BuildAgent\Appveyor.MSBuildLogger.dll"

artifacts:
  - path: 'x64\Release\*.sys'
    name: Driver
